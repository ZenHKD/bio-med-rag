# =============================================================================
# bio-med-rag — Base Configuration
# =============================================================================
# DO NOT put secrets here. Use .env for API keys.
# To override any field, copy configs/config.local.yaml.example
# to configs/config.local.yaml and edit only the fields you need.
# =============================================================================

project:
  name: bio-med-rag
  version: "0.1.0"

# ---------------------------------------------------------------------------
# Data
# ---------------------------------------------------------------------------
data:
  raw_dir: data/external
  processed_dir: data/processed
  # Glob patterns for files to load (relative to raw_dir)
  file_patterns:
    - "**/*.json"
    - "**/*.txt"

# ---------------------------------------------------------------------------
# Chunking
# ---------------------------------------------------------------------------
chunking:
  strategy: recursive          # Options: recursive | sentence | semantic
  chunk_size: 512              # Characters (not tokens)
  chunk_overlap: 64
  separators: ["\n\n", "\n", ". ", " ", ""]

# ---------------------------------------------------------------------------
# Encoder (Embedding Model)
# ---------------------------------------------------------------------------
encoder:
  provider: huggingface        # Options: huggingface | openai
  model_name: "BAAI/bge-small-en-v1.5"
  device: cpu                  # Options: cpu | cuda | mps
  encode_kwargs:
    normalize_embeddings: true

# ---------------------------------------------------------------------------
# Vectorstore
# ---------------------------------------------------------------------------
vectorstore:
  backend: chroma              # Options: chroma | faiss
  persist_dir: data/vectorstore
  collection_name: bio-med-rag
  # FAISS index type (only used when backend=faiss)
  faiss_index_type: Flat

# ---------------------------------------------------------------------------
# Retriever
# ---------------------------------------------------------------------------
retriever:
  top_k: 5
  search_type: similarity      # Options: similarity | mmr

# ---------------------------------------------------------------------------
# Reranker (optional)
# ---------------------------------------------------------------------------
reranker:
  enabled: false
  provider: cross_encoder      # Options: cross_encoder | cohere
  model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_n: 3                     # How many docs to keep after reranking

# ---------------------------------------------------------------------------
# Decoder (LLM)
# ---------------------------------------------------------------------------
decoder:
  provider: huggingface        # Options: huggingface | openai
  model_name: "microsoft/BioGPT-Large"
  device: cpu
  # Generation kwargs
  generation:
    max_new_tokens: 512
    temperature: 0.1
    do_sample: false

# ---------------------------------------------------------------------------
# Prompt
# ---------------------------------------------------------------------------
prompt:
  system: >
    You are a biomedical expert assistant.
    Answer the question using ONLY the information in the provided context.
    If the context does not contain enough information, say "I don't know."
    Be concise and precise.
  # Available variables: {context}, {question}
  template: |
    {system}

    Context:
    {context}

    Question: {question}
    Answer:

# ---------------------------------------------------------------------------
# Evaluation (RAGAS)
# ---------------------------------------------------------------------------
evaluation:
  enabled: true
  metrics:
    - faithfulness
    - answer_relevancy
    - context_recall
  output_dir: results/evaluation

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  level: INFO                  # Options: DEBUG | INFO | WARNING | ERROR
